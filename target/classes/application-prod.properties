# ==============================================================================
# AFROCHOW - PRODUCTION CONFIGURATION
# ==============================================================================
# IMPORTANT: This file contains production-specific settings
# All sensitive values MUST be loaded from environment variables
# ==============================================================================

spring.application.name=afrochow

# ==============================================================================
# DATABASE CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# JPA + HIBERNATE CONFIGURATION (PRODUCTION)
# ==============================================================================
# CRITICAL: Use 'validate' in production (NOT 'update')
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Edmonton

# ==============================================================================
# HIKARI CONNECTION POOL (PRODUCTION)
# ==============================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=AfrochowProductionPool

# ==============================================================================
# JWT CONFIGURATION (PRODUCTION)
# ==============================================================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}
app.jwt.encryption.enabled=true

# ==============================================================================
# SECURITY CONFIGURATION (PRODUCTION)
# ==============================================================================
security.login.max-attempts=${SECURITY_MAX_LOGIN_ATTEMPTS:5}
security.login.lockout-duration-minutes=${SECURITY_LOCKOUT_DURATION:15}
security.login.cleanup-days=${SECURITY_CLEANUP_DAYS:30}
security.events.retention-days=${SECURITY_EVENTS_RETENTION_DAYS:90}
security.password-reset.expiration-minutes=${SECURITY_PASSWORD_RESET_EXPIRATION:60}

# ==============================================================================
# SERVER CONFIGURATION (PRODUCTION)
# ==============================================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.http2.enabled=true

# ==============================================================================
# LOGGING CONFIGURATION (PRODUCTION)
# ==============================================================================
logging.level.root=WARN
logging.level.com.afrochow.afrochow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log to file in production
logging.file.name=/var/log/afrochow/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==============================================================================
# FILE UPLOAD CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ==============================================================================
# FLYWAY CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.locations=classpath:db/migration

# ==============================================================================
# CACHE CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s
logging.level.org.springframework.cache=WARN

# ==============================================================================
# SWAGGER/API DOCUMENTATION (PRODUCTION)
# ==============================================================================
# DISABLE Swagger in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ==============================================================================
# CORS CONFIGURATION (PRODUCTION)
# ==============================================================================

# ==============================================================================
# EMAIL CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.mail.enabled=${SPRING_MAIL_ENABLED:true}
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# SMTP Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Encoding
spring.mail.default-encoding=UTF-8

# Application Information for Emails
app.name=${APP_NAME:Afrochow}
app.url=${APP_URL}

# ==============================================================================
# ACTUATOR CONFIGURATION (PRODUCTION)
# ==============================================================================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true


# ==============================================================================
# End of production configuration
# ==============================================================================

# Production CORS
cors.allowed-origins=https://afrochow.com,https://www.afrochow.com,https://afrochow.ca,https://www.afrochow.ca

# Stronger BCrypt for production
security.bcrypt.strength=12

# OR for production
app.frontend.url=https://afrochow.com