spring.application.name=afrochow-test

# In-memory DB for tests (avoid requiring MySQL + schema migrations for context-load tests)
spring.datasource.url=jdbc:h2:mem:afrochow_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Flyway for unit tests (MySQL-specific SQL in migrations)
spring.flyway.enabled=false

# Provide required secrets/keys with safe dummy values
app.jwt.secret=jwtkey_64chars_minimum_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000
app.jwt.encryption.enabled=false
app.jwt.encryption.key=test-encryption-key
app.security.token-secret=tokenkey_64chars_minimum_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

stripe.secret.key=sk_test_dummy
stripe.webhook.secret=
resend.api-key=re_test_dummy
spring.mail.enabled=false

# Reduce noise
logging.level.root=WARN
logging.level.com.afrochow=INFO

