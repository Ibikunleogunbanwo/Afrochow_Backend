spring.application.name=afrochow
##############################
# MySQL DATABASE CONFIG
##############################
# SECURITY: All sensitive values loaded from environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:afrochow}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver




##############################
# JPA + HIBERNATE CONFIG
##############################
# Default safe value — overridden by application-dev.properties (create) and application-prod.properties (update)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# IMPORTANT: Use MySQLDialect for Hibernate 7 (Spring Boot 4)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Edmonton

##############################
# HIKARI CONNECTION POOL (RECOMMENDED)
##############################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=AfrochowPool

logging.level.com.afrochow.security.JwtAuthenticationFilter=DEBUG
# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}
app.jwt.encryption.enabled=true
app.jwt.encryption.key=${APP_JWT_ENCRYPTION_KEY}
app.security.token-secret=${APP_TOKEN_SECRET}

spring.jpa.open-in-view=false

# SECURITY: Account Lockout Configuration (OWASP ASVS V2.2.1)
security.login.max-attempts=${SECURITY_MAX_LOGIN_ATTEMPTS:5}
security.login.lockout-duration-minutes=${SECURITY_LOCKOUT_DURATION:15}
security.login.cleanup-days=${SECURITY_CLEANUP_DAYS:30}

# SECURITY: Security Event Logging Configuration
security.events.retention-days=${SECURITY_EVENTS_RETENTION_DAYS:90}

# SECURITY: Password Reset Configuration
security.password-reset.expiration-minutes=${SECURITY_PASSWORD_RESET_EXPIRATION:60}

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ===== Logging Configuration (overridden per profile) =====
logging.level.root=INFO
logging.level.com.afrochow=INFO
logging.level.org.springframework.security=WARN

# ===== File Upload Configuration =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Image Upload Settings
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:5242880}


spring.cache.type=caffeine
logging.level.org.springframework.cache=WARN

# Swagger disabled by default — enabled in application-dev.properties
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ===================================
# EMAIL CONFIGURATION (Resend HTTP API)
# ===================================
# Uses Resend HTTP API (port 443) instead of SMTP (port 587) to avoid Railway port blocking

# Enable/disable email sending
spring.mail.enabled=${SPRING_MAIL_ENABLED:true}

# Resend API key — set RESEND_API_KEY in Railway / .env
resend.api-key=${RESEND_API_KEY}

# From address — must be verified in Resend dashboard
resend.from=${RESEND_FROM:onboarding@resend.dev}
spring.mail.from-name=${APP_NAME:Afrochow}

# Email Verification Settings
app.email.verification.expiration-minutes=1440

# ===================================
# THYMELEAF CONFIGURATION
# ===================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mail.default-encoding=UTF-8

app.name=${APP_NAME:Afrochow}
app.url=${APP_URL:https://afrochow.ca}

# CORS — overridden per profile
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# BCrypt strength — overridden per profile (dev=10, prod=12)
security.bcrypt.strength=10

app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Rate limiting — overridden per profile (prod has stricter limits)
rate-limit.registration.max=50
rate-limit.registration.window-seconds=60

rate-limit.login.max=50
rate-limit.login.window-seconds=60

rate-limit.password-reset.max=50
rate-limit.password-reset.window-seconds=60

