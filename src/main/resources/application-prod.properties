# ==============================================================================
# AFROCHOW - PRODUCTION CONFIGURATION
# ==============================================================================
# Loaded when SPRING_PROFILES_ACTIVE=prod
# Base application.properties is always loaded first; this file overrides it.
# All sensitive values MUST come from Railway environment variables.
# ==============================================================================

spring.application.name=afrochow

# ==============================================================================
# DATABASE CONFIGURATION (PRODUCTION)
# ==============================================================================
# NOTE: REDACTED_DB_HOST is an internal private network connection.
# SSL is NOT supported/needed on Railway internal connections — useSSL must be false.
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# JPA + HIBERNATE CONFIGURATION (PRODUCTION)
# ==============================================================================
# Schema is managed exclusively by Flyway migrations.
# 'validate' ensures Hibernate verifies the DB matches JPA entities at startup
# and never silently modifies the schema — any drift causes a hard startup failure.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Edmonton

# ==============================================================================
# HIKARI CONNECTION POOL (PRODUCTION)
# ==============================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=AfrochowProductionPool

# ==============================================================================
# JWT CONFIGURATION (PRODUCTION)
# ==============================================================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}
app.jwt.encryption.enabled=true
app.jwt.encryption.key=${APP_JWT_ENCRYPTION_KEY}
app.security.token-secret=${APP_TOKEN_SECRET}

# ==============================================================================
# SECURITY CONFIGURATION (PRODUCTION)
# ==============================================================================
security.login.max-attempts=${SECURITY_MAX_LOGIN_ATTEMPTS:5}
security.login.lockout-duration-minutes=${SECURITY_LOCKOUT_DURATION:15}
security.login.cleanup-days=${SECURITY_CLEANUP_DAYS:30}
security.events.retention-days=${SECURITY_EVENTS_RETENTION_DAYS:90}
security.password-reset.expiration-minutes=${SECURITY_PASSWORD_RESET_EXPIRATION:60}

# Stronger BCrypt for production
security.bcrypt.strength=12

# ==============================================================================
# SERVER CONFIGURATION (PRODUCTION)
# ==============================================================================
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.http2.enabled=true
server.forward-headers-strategy=FRAMEWORK

# ==============================================================================
# LOGGING CONFIGURATION (PRODUCTION)
# ==============================================================================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=WARN
logging.level.com.afrochow=INFO

logging.level.com.afrochow.seeder=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.afrochow.security.JwtAuthenticationEntryPoint=WARN

# ==============================================================================
# FILE UPLOAD CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:10485760}

# ==============================================================================
# FLYWAY CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.flyway.enabled=true
# baseline-on-migrate: if flyway_schema_history doesn't exist, create it and
#   mark all migrations up to baseline-version as already applied (schema exists).
spring.flyway.baseline-on-migrate=true
# baseline-version must match the highest existing migration (currently V16).
# Update this when new migrations are added only if the history table is being
# re-created from scratch — otherwise Flyway tracks new versions automatically.
spring.flyway.baseline-version=16
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.locations=classpath:db/migration

# ==============================================================================
# CACHE CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s

# ==============================================================================
# THYMELEAF CONFIGURATION (PRODUCTION)
# ==============================================================================
# Override base config: enable template caching in production for performance
spring.thymeleaf.cache=true

# ==============================================================================
# SWAGGER / API DOCS (PRODUCTION)
# ==============================================================================
# Disabled in production for security
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ==============================================================================
# CORS CONFIGURATION (PRODUCTION)
# ==============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ==============================================================================
# COOKIE CONFIGURATION (PRODUCTION)
# ==============================================================================
# Domain scoping for HttpOnly cookies (access_token, refresh_token).
# Leading dot covers all subdomains (e.g. .afrochow.ca covers api.afrochow.ca + afrochow.ca).
# Set COOKIE_DOMAIN in your server environment variables.
app.cookie.domain=${COOKIE_DOMAIN:.afrochow.ca}

# ==============================================================================
# EMAIL CONFIGURATION (PRODUCTION)
# ==============================================================================
spring.mail.enabled=${SPRING_MAIL_ENABLED:true}

# Resend HTTP API — bypasses Railway SMTP port blocking (uses HTTPS/443)
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:onboarding@resend.dev}
spring.mail.from-name=${APP_NAME:Afrochow}

# Email verification expiration
app.email.verification.expiration-minutes=1440

# ==============================================================================
# APPLICATION URLS
# ==============================================================================
app.name=${APP_NAME:Afrochow}
app.url=${APP_URL}
app.frontend.url=${APP_FRONTEND_URL:https://afrochow.ca}

# ==============================================================================
# STRIPE CONFIGURATION (PRODUCTION)
# ==============================================================================
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.connect.required=false

# ==============================================================================
# RATE LIMITING (PRODUCTION - Stricter than dev)
# ==============================================================================
rate-limit.registration.max=5
rate-limit.registration.window-seconds=3600

rate-limit.login.max=10
rate-limit.login.window-seconds=900

rate-limit.password-reset.max=5
rate-limit.password-reset.window-seconds=3600

# ==============================================================================
# ACTUATOR (PRODUCTION)
# ==============================================================================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true


