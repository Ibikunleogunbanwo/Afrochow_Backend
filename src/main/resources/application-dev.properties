# ==============================================================================
# AFROCHOW - DEVELOPMENT CONFIGURATION
# ==============================================================================
# Loaded when SPRING_PROFILES_ACTIVE=dev
# Base application.properties is always loaded first; this file overrides it.
# ==============================================================================

spring.application.name=afrochow

# ==============================================================================
# DATABASE CONFIGURATION (DEVELOPMENT)
# ==============================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:afrochow_dev}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# JPA + HIBERNATE CONFIGURATION (DEVELOPMENT)
# ==============================================================================
# create-drop: recreates schema on every restart — good for local reseeding
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Edmonton

# ==============================================================================
# HIKARI CONNECTION POOL (DEVELOPMENT)
# ==============================================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=AfrochowDevPool

# ==============================================================================
# LOGGING (DEV)
# ==============================================================================
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=INFO
logging.level.com.afrochow=DEBUG

# ==============================================================================
# SWAGGER / API DOCS (DEVELOPMENT)
# ==============================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ==============================================================================
# SECURITY CONFIGURATION (DEVELOPMENT)
# ==============================================================================
security.bcrypt.strength=10
security.login.max-attempts=10
security.login.lockout-duration-minutes=5

# ==============================================================================
# STRIPE CONFIGURATION (DEVELOPMENT - use test keys)
# ==============================================================================
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.connect.required=false

# ==============================================================================
# CORS CONFIGURATION (DEVELOPMENT)
# ==============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# ==============================================================================
# RATE LIMITING (DEVELOPMENT - very lenient)
# ==============================================================================
rate-limit.registration.max=100
rate-limit.registration.window-seconds=60

rate-limit.login.max=100
rate-limit.login.window-seconds=60

rate-limit.password-reset.max=100
rate-limit.password-reset.window-seconds=60

# ==============================================================================
# CACHE CONFIGURATION (DEVELOPMENT)
# ==============================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=60s

# ==============================================================================
# THYMELEAF CONFIGURATION (DEVELOPMENT)
# ==============================================================================
spring.thymeleaf.cache=false

# ==============================================================================
# EMAIL (DEVELOPMENT)
# ==============================================================================
spring.mail.enabled=${SPRING_MAIL_ENABLED:true}
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:noreply@afrochow.ca}


